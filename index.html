<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock paper scissors</title>
        <link rel="stylesheet" href="style.css">
        <script defer src="script.js"></script>
    </head>
    <body>

        <section class="game">
            <div id="rock" class="rock cont"><h1 class="header">Rock</h1></div>
            <div id="paper" class="paper cont"><h1
                    class="header">Paper</h1></div>
            <div id="scissors" class="scissors cont"><h1
                    class="header">Scissors</h1></div>
            <div class="counter">
                <div class="numbers" id="playerC">0</div>
                <div class="numbers" id="PcC">0</div>
            </div>
        </section>
    </body>
</html>
